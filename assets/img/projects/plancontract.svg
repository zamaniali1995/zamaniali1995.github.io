<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="PlanContract">
  <defs>
    <linearGradient id="pc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#1a1640"/>
    </linearGradient>
    <linearGradient id="pc-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="pc-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes pc-flow { to { stroke-dashoffset: -24; } }
    @keyframes pc-pulse { 0%,100%{opacity:.85} 50%{opacity:1} }
    .pc-flow { stroke-dasharray:8 6; animation:pc-flow 1.5s linear infinite; }
    .pc-box { animation:pc-pulse 2.4s ease-in-out infinite; }
    .pc-box2 { animation:pc-pulse 2.4s ease-in-out infinite .4s; }
    .pc-box3 { animation:pc-pulse 2.4s ease-in-out infinite .8s; }
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <rect width="800" height="450" fill="url(#pc-bg)"/>
  <circle cx="100" cy="70" r="110" fill="#38bdf8" opacity="0.18"/>
  <circle cx="720" cy="380" r="120" fill="#c084fc" opacity="0.2"/>
  <circle cx="400" cy="220" r="160" fill="#818cf8" opacity="0.08"/>

  <g class="pc-box" filter="url(#pc-glow)">
    <rect x="70" y="140" width="170" height="130" rx="18" fill="#243049" stroke="#38bdf8" stroke-width="3"/>
    <text x="155" y="195" text-anchor="middle" fill="#f1f5f9" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">PlanDraft</text>
    <text x="155" y="225" text-anchor="middle" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="14">LLM output</text>
  </g>

  <path class="pc-flow" d="M240 205 H285" stroke="url(#pc-line)" stroke-width="5"/>
  <polygon points="285,205 272,197 272,213" fill="#818cf8"/>

  <g class="pc-box2" filter="url(#pc-glow)">
    <rect x="285" y="140" width="190" height="130" rx="18" fill="#243049" stroke="#818cf8" stroke-width="3"/>
    <text x="380" y="190" text-anchor="middle" fill="#f1f5f9" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">validate</text>
    <text x="380" y="218" text-anchor="middle" fill="#c4b5fd" font-family="Inter, Arial, sans-serif" font-size="14">+ topology</text>
    <text x="380" y="245" text-anchor="middle" fill="#a5b4fc" font-family="Inter, Arial, sans-serif" font-size="13">Pydantic v2</text>
  </g>

  <path class="pc-flow" d="M475 205 H520" stroke="url(#pc-line)" stroke-width="5" style="animation-delay:.3s"/>
  <polygon points="520,205 507,197 507,213" fill="#c084fc"/>

  <g class="pc-box3" filter="url(#pc-glow)">
    <rect x="520" y="140" width="200" height="130" rx="18" fill="#243049" stroke="#c084fc" stroke-width="3"/>
    <text x="620" y="190" text-anchor="middle" fill="#f1f5f9" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">AgentPlan</text>
    <text x="620" y="218" text-anchor="middle" fill="#e9d5ff" font-family="Inter, Arial, sans-serif" font-size="14">execution waves</text>
    <circle cx="620" cy="248" r="12" fill="#22c55e"/>
    <path d="M613 248 L618 253 L629 240" fill="none" stroke="#052e16" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <circle r="6" fill="#38bdf8">
    <animateMotion dur="2.6s" repeatCount="indefinite" path="M155 205 H620"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <text x="400" y="355" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">PlanContract</text>
  <text x="400" y="390" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16">Planner -&gt; Validator -&gt; Dispatcher</text>
</svg>
