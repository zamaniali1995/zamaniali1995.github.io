<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Spotify Music Recommender">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f0a"/>
      <stop offset="100%" stop-color="#122612"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes sp-wave1 { 0%,100%{opacity:1} 50%{opacity:.55} }
    @keyframes sp-wave2 { 0%,100%{opacity:.8} 50%{opacity:.4} }
    @keyframes sp-wave3 { 0%,100%{opacity:.6} 50%{opacity:.3} }
    @keyframes sp-hub { 0%,100%{transform:scale(1);opacity:.15} 50%{transform:scale(1.08);opacity:.25} }
    @keyframes sp-rec { 0%,100%{opacity:.6} 50%{opacity:1} }
    .sp-hub { transform-origin:400px 210px; animation:sp-hub 2.5s ease-in-out infinite; }
    .sp-w1 { animation:sp-wave1 1.8s ease-in-out infinite; }
    .sp-w2 { animation:sp-wave2 1.8s ease-in-out infinite .2s; }
    .sp-w3 { animation:sp-wave3 1.8s ease-in-out infinite .4s; }
    .sp-target { animation:sp-rec 2.2s ease-in-out infinite; }
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <rect width="800" height="450" fill="url(#bg7)"/>
  <circle class="sp-hub" cx="400" cy="210" r="100" fill="#1db954" opacity="0.15"/>
  <circle cx="400" cy="210" r="70" fill="#1a2234" stroke="#1db954" stroke-width="3"/>
  <path class="sp-w1" d="M370 195 Q400 175 430 195 T490 205" fill="none" stroke="#1db954" stroke-width="5" stroke-linecap="round"/>
  <path class="sp-w2" d="M360 220 Q400 200 440 220 T500 232" fill="none" stroke="#1ed760" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path class="sp-w3" d="M350 245 Q400 225 450 245 T510 258" fill="none" stroke="#1ed760" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <rect x="170" y="150" width="90" height="90" rx="12" fill="#243049" stroke="#475569" stroke-width="1.5"/>
  <g class="sp-target">
    <rect x="540" y="150" width="90" height="90" rx="12" fill="#243049" stroke="#1db954" stroke-width="1.5"/>
  </g>
  <rect x="170" y="260" width="90" height="90" rx="12" fill="#243049" stroke="#475569" stroke-width="1.5"/>
  <rect x="540" y="260" width="90" height="90" rx="12" fill="#243049" stroke="#475569" stroke-width="1.5"/>
  <line x1="260" y1="195" x2="330" y2="210" stroke="#64748b" stroke-width="1.5"/>
  <line x1="470" y1="210" x2="540" y2="195" stroke="#1db954" stroke-width="1.5"/>
  <circle r="4" fill="#1db954">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M215 195 L330 210 L470 210 L585 195"/>
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="400" y="360" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">Music Recommender</text>
  <text x="400" y="390" text-anchor="middle" fill="#1db954" font-size="15" font-family="Inter, Arial, sans-serif">Content-Based / Clustering / Deep Learning</text>
</svg>
